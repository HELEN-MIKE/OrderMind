name: Build Installers

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release-build.yml"
      - "CHANGELOG.md"
      - "VERSION"
      - "desktop/**"
      - "ordermind/**"
      - "package-lock.json"
      - "package.json"
      - "release/update-manifest.example.json"
      - "run_app.py"
      - "samples/**"
      - "scripts/**"
      - "templates/**"
      - "tests/**"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate bundled samples
        run: python scripts/generate_customer_like_samples.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall ordermind run_app.py scripts

      - name: Check release metadata
        run: python scripts/release_check.py

  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python build tools
        run: python -m pip install pyinstaller==6.21.0

      - name: Install Node dependencies
        run: npm ci

      - name: Generate desktop assets and samples
        run: |
          python scripts/generate_desktop_icons.py
          python scripts/generate_customer_like_samples.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall ordermind run_app.py scripts

      - name: Check release metadata
        run: python scripts/release_check.py

      - name: Build Windows installers
        run: npm run desktop:dist:win

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: OrderMind-windows-installers
          path: |
            release/installers/*.exe
            release/installers/*.msi
          if-no-files-found: error

  mac-installer:
    name: Build macOS installer
    runs-on: macos-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python build tools
        run: python -m pip install pyinstaller==6.21.0

      - name: Install Node dependencies
        run: npm ci

      - name: Generate desktop assets and samples
        run: |
          python scripts/generate_desktop_icons.py
          python scripts/generate_customer_like_samples.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall ordermind run_app.py scripts

      - name: Check release metadata
        run: python scripts/release_check.py

      - name: Build macOS zip
        run: npm run desktop:dist:mac

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: OrderMind-macos-installers
          path: release/installers/*.zip
          if-no-files-found: error
